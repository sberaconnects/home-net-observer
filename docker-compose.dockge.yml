services:
  influxdb:
    image: influxdb:2.7
    container_name: hno-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2

  webui:
    build:
      context: .
      dockerfile: webui/Dockerfile
    container_name: hno-webui
    restart: unless-stopped
    depends_on:
      - influxdb
    ports:
      - "${WEBUI_HTTP_PORT}:8080"
    environment:
      WEBUI_LISTEN_ADDR: ":8080"
      WEBUI_INFLUX_URL: http://influxdb:8086
      WEBUI_LAN_PREFIX: ${WEBUI_LAN_PREFIX}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}

  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    container_name: hno-collector
    restart: unless-stopped
    depends_on:
      - influxdb
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      COLLECTOR_NAME: ${COLLECTOR_NAME}
      COLLECTOR_PACKET_ENABLED: ${COLLECTOR_PACKET_ENABLED}
      COLLECTOR_INTERFACE: ${COLLECTOR_INTERFACE}
      COLLECTOR_PROMISCUOUS: ${COLLECTOR_PROMISCUOUS}
      COLLECTOR_FLUSH_INTERVAL: ${COLLECTOR_FLUSH_INTERVAL}
      COLLECTOR_INFLUX_URL: http://127.0.0.1:8086
      COLLECTOR_LOG_LEVEL: ${COLLECTOR_LOG_LEVEL}
      COLLECTOR_SCAN_ENABLED: ${COLLECTOR_SCAN_ENABLED}
      COLLECTOR_SCAN_INTERVAL: ${COLLECTOR_SCAN_INTERVAL}
      COLLECTOR_SCAN_CIDR: ${COLLECTOR_SCAN_CIDR}
      COLLECTOR_SCAN_MAX_HOSTS: ${COLLECTOR_SCAN_MAX_HOSTS}
      COLLECTOR_DEVICE_LABELS: /etc/home-net-observer/devices.csv
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      ADGUARD_BASE_URL: ${ADGUARD_BASE_URL}
      ADGUARD_USERNAME: ${ADGUARD_USERNAME}
      ADGUARD_PASSWORD: ${ADGUARD_PASSWORD}
      ADGUARD_ENABLED: ${ADGUARD_ENABLED}
      ADGUARD_POLL_INTERVAL: ${ADGUARD_POLL_INTERVAL}
      ADGUARD_QUERY_LIMIT: ${ADGUARD_QUERY_LIMIT}
    volumes:
      - ./config:/etc/home-net-observer:ro

volumes:
  influxdb-data:
  influxdb-config:
