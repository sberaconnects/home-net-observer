services:
  influxdb:
    image: influxdb:2.7
    container_name: hno-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2

  grafana:
    image: grafana/grafana:11.3.0
    container_name: hno-grafana
    restart: unless-stopped
    depends_on:
      - influxdb
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./provisioning/grafana:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro

  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    container_name: hno-collector
    restart: unless-stopped
    profiles:
      - collector
    depends_on:
      - influxdb
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      COLLECTOR_NAME: ${COLLECTOR_NAME}
      COLLECTOR_INTERFACE: ${COLLECTOR_INTERFACE}
      COLLECTOR_PROMISCUOUS: ${COLLECTOR_PROMISCUOUS}
      COLLECTOR_FLUSH_INTERVAL: ${COLLECTOR_FLUSH_INTERVAL}
      COLLECTOR_INFLUX_URL: ${COLLECTOR_INFLUX_URL}
      COLLECTOR_LOG_LEVEL: ${COLLECTOR_LOG_LEVEL}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
